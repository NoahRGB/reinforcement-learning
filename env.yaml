name: ml
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10

  # Core scientific stack
  - numpy
  - pandas
  - matplotlib
  - scipy
  - scikit-learn

  # TensorFlow (CPU)
  - tensorflow
  - tensorboard

  # PyTorch (CPU)
  - pytorch
  - torchvision
  - torchaudio
  - cpuonly

  # RL environments
  - gymnasium
  - pip

  # Install Gymnasium extras via pip
  - pip:
      - "gymnasium[all]"
